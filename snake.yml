name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"  # runs once a day
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?color_snake=#9B7EDE&color_dots=#1e1e2e,#3D2C54,#6C4A9C,#9B7EDE,#D4BFEA
            dist/github-contribution-grid-snake.gif?color_snake=#9B7EDE&color_dots=#1e1e2e,#3D2C54,#6C4A9C,#9B7EDE,#D4BFEA&color_background=#0d1117

      - name: Push snake animation to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
